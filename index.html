<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- Primary SEO -->
    <title>IB Grade Tracker | Track IB Grades, Predicted Scores and Progress</title>
    <meta name="description" content="IB Grade Tracker is a student-made platform that helps IB students track grades, predicted scores, subject goals, core points, progress graphs, and university targets." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ib-grade-tracker.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="IB Grade Tracker" />
    <meta property="og:url" content="https://ib-grade-tracker.vercel.app/" />
    <meta property="og:title" content="IB Grade Tracker | Track IB Grades, Predicted Scores and Progress" />
    <meta property="og:description" content="IB Grade Tracker helps IB students track grades, predicted scores, subject goals, core points, progress graphs, and university targets." />
    <meta property="og:image" content="https://ib-grade-tracker.vercel.app/apple-touch-icon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://ib-grade-tracker.vercel.app/" />
    <meta name="twitter:title" content="IB Grade Tracker | Track IB Grades, Predicted Scores and Progress" />
    <meta name="twitter:description" content="IB Grade Tracker helps IB students track grades, predicted scores, subject goals, core points, progress graphs, and university targets." />
    <meta name="twitter:image" content="https://ib-grade-tracker.vercel.app/apple-touch-icon.png" />

    <!-- WebSite Structured Data (tells Google the site name) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "IB Grade Tracker",
      "alternateName": ["Your Grade Tracker", "IBGradeTracker"],
      "url": "https://ib-grade-tracker.vercel.app/",
      "description": "IB Grade Tracker helps IB students track grades, predicted scores, subject goals, core points, progress graphs, and university targets."
    }
    </script>

    <!-- Organization Structured Data (tells Google the logo URL) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "IB Grade Tracker",
      "url": "https://ib-grade-tracker.vercel.app/",
      "logo": "https://ib-grade-tracker.vercel.app/favicon-192x192.png"
    }
    </script>

    <!-- SoftwareApplication Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "IB Grade Tracker",
      "url": "https://ib-grade-tracker.vercel.app/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "description": "Free web app for IB Diploma students to track grades, predicted scores, core points, and progress.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
